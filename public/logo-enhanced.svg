<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 82" width="260" height="82" role="img" aria-label="Himani Global Education &amp; Visa">
  <defs>
    <linearGradient id="swirlG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6C5CE7"/>
      <stop offset="50%"  stop-color="#8B7BFF"/>
      <stop offset="100%" stop-color="#A89CFF"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-80%" width="160%" height="360%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Flourish swirl (above wordmark) ── -->
  <!-- The looping flourish: starts upper-left, spirals, then sweeps right to globe -->
  <path
    d="M 28 34
       C 20 26, 16 14, 30 10
       C 44 6,  52 18, 42 26
       C 32 34, 36 16, 54 14
       C 72 12, 72 28, 60 32
       C 50 36, 56 18, 74 17
       C 92 16, 96 28, 112 22
       C 126 17, 140 14, 156 18"
    fill="none"
    stroke="url(#swirlG)"
    stroke-width="1.9"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#softGlow)"
  />
  <!-- Arrow at end -->
  <polyline
    points="148,13 157,18 148,23"
    fill="none"
    stroke="#8B7BFF"
    stroke-width="1.9"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#softGlow)"
  />

  <!-- Globe icon at arrow tip -->
  <g transform="translate(166, 18)" filter="url(#softGlow)">
    <circle cx="0" cy="0" r="6"   fill="none" stroke="#8B7BFF" stroke-width="1.3"/>
    <ellipse cx="0" cy="0" rx="2.8" ry="6" fill="none" stroke="#8B7BFF" stroke-width="1"   opacity="0.65"/>
    <line x1="-6"  y1="0" x2="6"  y2="0"  stroke="#8B7BFF" stroke-width="1"   opacity="0.65"/>
    <line x1="-5"  y1="-3" x2="5" y2="-3" stroke="#8B7BFF" stroke-width="0.8" opacity="0.45"/>
    <line x1="-5"  y1="3"  x2="5" y2="3"  stroke="#8B7BFF" stroke-width="0.8" opacity="0.45"/>
  </g>

  <!-- ── Pen-nib accent on "i" dot (approx position over first i in Himani) ── -->
  <!-- Positioned at roughly x=57, y=36 (above the i in "Hi") -->
  <polygon points="56,37 59,31 62,37" fill="#6C5CE7" opacity="0.85"/>

  <!-- ── "Himani" wordmark ── -->
  <text
    x="0" y="68"
    font-family="'Arial Black', 'Arial Bold', Gadget, sans-serif"
    font-size="48"
    font-weight="900"
    fill="#1a1560"
    letter-spacing="-1"
  >Himani</text>

  <!-- ── Tagline ── -->
  <text
    x="2" y="80"
    font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif"
    font-size="13"
    font-weight="400"
    fill="#4a4690"
    letter-spacing="0.4"
  >Global Education &amp; Visa</text>
</svg>
